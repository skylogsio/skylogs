# Sentinel (Go) CI
# ADJUST: working-directory paths if your sentinel is not at apps/sentinel
name: CI Sentinel

on:
  push:
    branches: [main]
    paths: ["apps/sentinel/**"]
  pull_request:
    paths: ["apps/sentinel/**"]

defaults:
  run:
    working-directory: apps/sentinel

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/sentinel/go.mod
          cache-dependency-path: apps/sentinel/go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: apps/sentinel

      - name: Tests
        run: go test -race ./...

      - name: Build
        run: go build ./...
