x-back-env: &back-env
  environment:
  - APP_ENV=local
  - APP_DEBUG=true
  - APP_URL=http://localhost:8000
  - FRONTEND_URL=http://localhost:8080
  - KAVENEGAR_TOKEN=
  - KAVENEGAR_SENDER_NUMBER=
  - TELEGRAM_BOT_TOKEN=
#  Change the secret
  - JWT_SECRET=mysecretmysecretmysecretmysecret

x-front-env: &front-env
  environment:
#   Change the secret (at least 32 characters)
    - NEXTAUTH_SECRET=GK/IKHJ55WUBSIDAFLT3vcQmud1t5PIZHsclw40JtVs=
    - NEXTAUTH_URL=http://localhost:8000
    - BASE_URL=http://nginx:80/api/v1/


services:
    skylogs-back:
        build: apps/backend
        container_name: skylogs_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - app_data:/var/www/html
        networks:
            - skylogs_net
        depends_on:
            - mongo
            - redis
        <<: *back-env

    nginx:
        image: nginx:latest
        container_name: skylogs_nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - app_data:/var/www/html
            - ./apps/backend/nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - skylogs_net
        depends_on:
            - skylogs-back

    mongo:
        image: mongo:latest
        container_name: skylogs_mongo
        restart: unless-stopped
        ports:
            - "27018:27017"
        networks:
            - skylogs_net
        volumes:
            - mongo_data:/data/db

    redis:
        image: redis:latest
        container_name: skylogs_redis
        restart: unless-stopped
        ports:
            - "6380:6379"
        networks:
            - skylogs_net

    horizon:
        build:
            context: apps/backend
            dockerfile: HorizonDockerfile
        container_name: skylogs_horizon
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - app_data:/var/www/html
        depends_on:
            - skylogs-back
            - mongo
            - redis
        networks:
            - skylogs_net
        <<: *back-env


    front:
        build: apps/frontend
        restart: unless-stopped
        ports:
            - 8080:3000
        networks:
            - skylogs_net
        depends_on:
            - nginx
        <<: *front-env

    # Main sentinel: define full peers: in apps/sentinel/config.yaml (role main). Agents use MAIN_SENTINEL_URL + cache.
    skylogs-sentinel:
        build: apps/sentinel
        container_name: skylogs-sentinel
        restart: always
        depends_on:
        - skylogs-back
        environment:
          - SENTINEL_ID=main-cluster-sentinel
          - SENTINEL_ROLE=main
          - HEARTBEAT_INTERVAL=5s
          - HEARTBEAT_TIMEOUT=3s
          - HEARTBEAT_FAIL_AFTER=15s
          - ALERT_BASE_URL=http://nginx:80
        volumes:
          - ./apps/sentinel/config.yaml:/app/config.yaml:ro
        ports:
          - "9191:9191"
        networks:
          - skylogs_net

    # Optional second zone: uncomment and point config at main (see apps/sentinel/config.example.yaml).
    # skylogs-sentinel-agent:
    #     build: apps/sentinel
    #     container_name: skylogs-sentinel-agent
    #     restart: always
    #     depends_on:
    #       - skylogs-sentinel
    #     environment:
    #       - SENTINEL_ID=agent-zone-sentinel
    #       - SENTINEL_ROLE=agent
    #       - MAIN_SENTINEL_URL=http://skylogs-sentinel:9191
    #       - CLUSTER_REFRESH_INTERVAL=30s
    #       - PEERS_CACHE_FILE=/data/sentinel-peers-cache.json
    #       - HEARTBEAT_INTERVAL=5s
    #       - HEARTBEAT_TIMEOUT=3s
    #       - HEARTBEAT_FAIL_AFTER=15s
    #       - ALERT_BASE_URL=http://nginx:80
    #       - SHARED_SECRET=${SENTINEL_SHARED_SECRET:-}
    #     volumes:
    #       - ./apps/sentinel/config.agent.yaml:/app/config.yaml:ro
    #       - sentinel_peer_cache:/data
    #     ports:
    #       - "9192:9191"
    #     networks:
    #       - skylogs_net
networks:
    skylogs_net:
        driver: bridge

volumes:
    app_data:
    mongo_data:
        driver: local
